name: Retarget Stacked PRs

on:
  pull_request:
    types: [closed]

jobs:
  retarget:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Retarget PRs based on the merged branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          MERGED_BRANCH: ${{ github.event.pull_request.head.ref }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
        run: |
          numbers=$(gh pr list --repo "$REPO" --state open --base "$MERGED_BRANCH" --json number --jq '.[].number')
          for number in $numbers; do
            echo "Retargeting #$number: $MERGED_BRANCH -> $BASE_BRANCH"
            gh pr edit "$number" --repo "$REPO" --base "$BASE_BRANCH"
          done
